<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Academic Archive</title>
    <style>
        /* --- CORE SYSTEM --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
            color: #111;
            overflow: hidden; 
        }

        .layout { display: flex; height: 100vh; width: 100vw; }

        /* --- SIDEBAR (McGillick Style) --- */
        nav.sidebar {
            width: 220px;
            height: 100%;
            border-right: 1px solid #eee;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            flex-shrink: 0;
            background: #fff;
            z-index: 100;
        }

        nav.sidebar a {
            text-decoration: none;
            color: #aaa;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.12rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        nav.sidebar a.active { color: #111; font-weight: 600; }

        /* --- CONTENT CONTAINER --- */
        main {
            flex-grow: 1;
            height: 100%;
            overflow-y: auto; 
            position: relative;
        }

        section { 
            display: none; 
            width: 100%;
            min-height: 100%; 
            background: #fff; 
        }
        
        section.active { display: block; }

        /* --- HOME: ENVIRONMENTAL SPECTRUM --- */
        #home.active { display: flex; } 
        #home {
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 3s ease; /* Slower, smoother spectrum shift */
            overflow: hidden; 
            text-align: center;
            padding: 0 5%;
        }

        #condition-text { 
            font-size: 4rem; 
            font-weight: 300; 
            letter-spacing: -0.04em; 
            margin-bottom: 1rem;
            text-transform: capitalize;
        }
        
        .algo-desc {
            position: absolute;
            bottom: 3.5rem;
            width: 90%;
            max-width: 1100px;
            font-size: 0.95rem; /* Increased size */
            color: rgba(0,0,0,0.5);
            line-height: 1.4;
            letter-spacing: 0.01em;
        }

        /* --- ARCHIVE PAGES (Rickard Style) --- */
        .page-container { padding: 4rem 10%; max-width: 1000px; }
        
        .sub-nav {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3.5rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }

        .sub-nav span {
            font-size: 0.75rem;
            color: #aaa;
            cursor: pointer;
            text-transform: lowercase;
            letter-spacing: 0.05em;
        }

        .sub-nav span.active, .sub-nav span:hover { color: #111; }

        .archive-item {
            display: flex;
            padding: 0.7rem 0;
            text-decoration: none;
            color: inherit;
            font-size: 0.95rem;
            border-bottom: 1px solid #f9f9f9;
        }

        .archive-item:hover .title { color: #666; }
        .date { color: #ccc; font-family: monospace; width: 100px; flex-shrink: 0; font-size: 0.85rem; }
        .title { flex-grow: 1; }

    </style>
</head>
<body>

    <div class="layout">
        <nav class="sidebar">
            <a onclick="route('home')" id="nav-home" class="active">Home</a>
            <a onclick="route('posts')" id="nav-posts">Posts</a>
            <a onclick="route('interactive')" id="nav-interactive">Interactive</a>
        </nav>

        <main id="main-content">
            
            <section id="home" class="active">
                <h1 id="condition-text">Connecting...</h1>
                <div class="algo-desc">
                    This interface translates your local meteorological data into a visual spectrum: yellow signifies solar clarity and clear skies, 
                    while blue represents atmospheric density and overcast conditions.
                </div>
            </section>

            <section id="posts">
                <div class="page-container">
                    <div class="sub-nav">
                        <span class="active">all</span>
                        <span>most popular</span>
                        <span>society</span>
                        <span>cases</span>
                        <span>reviews</span>
                        <span>misc</span>
                    </div>
                    <div id="posts-list"></div>
                </div>
            </section>

            <section id="interactive">
                <div class="page-container">
                    <div class="sub-nav">
                        <span class="active">all</span>
                        <span>data</span>
                        <span>design</span>
                    </div>
                    <div id="int-list"></div>
                </div>
            </section>

        </main>
    </div>

    <script>
        // 1. ROUTING LOGIC
        function route(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');

            document.getElementById('main-content').scrollTop = 0;
        }

        // 2. DATA LOAD (Descending Date Order)
        function loadContent() {
            const postsList = document.getElementById('posts-list');
            const intList = document.getElementById('int-list');

            // Posts: 20 items (Format: YY-MM-DD)
            for(let i=20; i>=1; i--) {
                const day = i < 10 ? '0'+i : i;
                postsList.innerHTML += `
                <a href="#" class="archive-item">
                    <span class="date">26-04-${day}</span>
                    <span class="title">Paper Title ${i}</span>
                </a>`;
            }

            // Interactive: 10 items
            for(let i=10; i>=1; i--) {
                const day = i < 10 ? '0'+i : i;
                intList.innerHTML += `
                <a href="#" class="archive-item">
                    <span class="date">26-04-${day}</span>
                    <span class="title">Interactive Experiment ${i}</span>
                </a>`;
            }
        }
        loadContent();

        // 3. WEATHER SPECTRUM ALGORITHM
        const apiKey = 'c879a68af9adfd66fee980f91922a692'; 

        function interpolateColor(clouds) {
            // Spectrum logic: 
            // 0% clouds (Sunny) = HSL(55, 100%, 65%) - Vibrant Yellow
            // 100% clouds (Gloomy) = HSL(210, 80%, 55%) - Deep Blue
            // We calculate the hue based on cloud percentage
            const hue = 55 + (clouds * 1.55); // 55 to 210
            const saturation = 100 - (clouds * 0.2); // 100% down to 80%
            const lightness = 65 - (clouds * 0.1); // 65% down to 55%
            
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        function setEnvironment(lat, lon) {
            fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}`)
                .then(r => r.json())
                .then(data => {
                    const cloudCover = data.clouds.all; // 0 to 100
                    const condition = data.weather[0].description;
                    const home = document.getElementById('home');
                    const text = document.getElementById('condition-text');

                    // Set Spectrum Color
                    home.style.backgroundColor = interpolateColor(cloudCover);
                    
                    // Display specific condition name
                    text.innerText = condition;

                    // Adjust text contrast for darker blues
                    text.style.color = (cloudCover > 60) ? "#fff" : "#111";
                })
                .catch(() => {
                    document.getElementById('condition-text').innerText = "Offline";
                });
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => setEnvironment(p.coords.latitude, p.coords.longitude));
        }
    </script>
</body>
</html>
