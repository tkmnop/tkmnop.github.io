<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Academic Archive</title>
    <style>
        /* --- CORE SYSTEM --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
            color: #111;
            overflow: hidden; 
        }

        .layout { display: flex; height: 100vh; width: 100vw; }

        /* --- SIDEBAR (McGillick Style) --- */
        nav.sidebar {
            width: 220px;
            height: 100%;
            border-right: 1px solid #eee;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            flex-shrink: 0;
            background: #fff;
            z-index: 10;
        }

        nav.sidebar a {
            text-decoration: none;
            color: #aaa;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.12rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        nav.sidebar a.active { color: #111; font-weight: 600; }

        /* --- CONTENT CONTAINER --- */
        main {
            flex-grow: 1;
            height: 100%;
            overflow-y: auto; 
            position: relative;
        }

        /* Essential: This ensures sections don't stack or peek through */
        section { 
            display: none; 
            width: 100%;
            min-height: 100%; 
            background: #fff; 
        }
        
        section.active { display: block; }

        /* --- HOME: ENVIRONMENTAL INTERFACE --- */
        #home.active { display: flex; } /* Flex for centering */
        #home {
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 2s ease;
            overflow: hidden; 
            text-align: center;
            padding: 0 5%;
        }

        #weather-statement { 
            font-size: 3.5rem; 
            font-weight: 300; 
            letter-spacing: -0.03em; 
            margin-bottom: 1rem;
        }
        
        .algo-desc {
            position: absolute;
            bottom: 3rem;
            width: 90%;
            max-width: 1000px; /* Wide to prevent wrapping */
            font-size: 0.8rem;
            color: rgba(0,0,0,0.5);
            line-height: 1.6;
            letter-spacing: 0.02em;
        }

        /* --- POSTS & INTERACTIVE (Rickard Style) --- */
        .page-container { padding: 4rem 10%; max-width: 1000px; }
        
        .sub-nav {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3.5rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }

        .sub-nav span {
            font-size: 0.75rem;
            color: #aaa;
            cursor: pointer;
            text-transform: lowercase;
            letter-spacing: 0.05em;
        }

        .sub-nav span.active, .sub-nav span:hover { color: #111; }

        /* Archive Items */
        .archive-item {
            display: flex;
            padding: 0.7rem 0;
            text-decoration: none;
            color: inherit;
            font-size: 0.95rem;
            border-bottom: 1px solid #f9f9f9;
        }

        .archive-item:hover .title { color: #666; }
        .date { color: #ccc; font-family: monospace; width: 100px; flex-shrink: 0; font-size: 0.85rem; }
        .title { flex-grow: 1; }

        h2 { font-size: 0.7rem; text-transform: uppercase; color: #bbb; letter-spacing: 0.2rem; margin-bottom: 2.5rem; }

    </style>
</head>
<body>

    <div class="layout">
        <nav class="sidebar">
            <a onclick="route('home')" id="nav-home" class="active">Home</a>
            <a onclick="route('posts')" id="nav-posts">Posts</a>
            <a onclick="route('interactive')" id="nav-interactive">Interactive</a>
        </nav>

        <main id="main-content">
            
            <section id="home" class="active">
                <h1 id="weather-statement">Syncing...</h1>
                <div class="algo-desc">
                    This interface translates local meteorological data into a visual spectrum: yellow signifies solar clarity and clear skies, 
                    while blue represents atmospheric density and overcast conditions.
                </div>
            </section>

            <section id="posts">
                <div class="page-container">
                    <div class="sub-nav">
                        <span class="active">all</span>
                        <span>most popular</span>
                        <span>society</span>
                        <span>cases</span>
                        <span>reviews</span>
                        <span>misc</span>
                    </div>
                    <div id="posts-list"></div>
                </div>
            </section>

            <section id="interactive">
                <div class="page-container">
                    <h2>Experiments & Prototypes</h2>
                    <div id="int-list"></div>
                </div>
            </section>

        </main>
    </div>

    <script>
        // 1. ROUTING LOGIC
        function route(id) {
            // Hide all
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            // Show target
            document.getElementById(id).classList.add('active');

            // Update Nav Style
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');

            // Reset scroll for the new page
            document.getElementById('main-content').scrollTop = 0;
        }

        // 2. DATA LOAD (Descending Order: Most Recent Top)
        function loadContent() {
            const postsList = document.getElementById('posts-list');
            const intList = document.getElementById('int-list');

            // Posts: 20 items (Date 26-04-20 to 26-04-01)
            for(let i=20; i>=1; i--) {
                const day = i < 10 ? '0'+i : i;
                postsList.innerHTML += `
                <a href="#" class="archive-item">
                    <span class="date">${day}-04-26</span>
                    <span class="title">Paper Title ${i}</span>
                </a>`;
            }

            // Interactive: 10 items
            for(let i=10; i>=1; i--) {
                const day = i < 10 ? '0'+i : i;
                intList.innerHTML += `
                <a href="#" class="archive-item">
                    <span class="date">${day}-04-26</span>
                    <span class="title">Interactive Experiment ${i}</span>
                </a>`;
            }
        }
        loadContent();

        // 3. WEATHER SENSOR
        const apiKey = 'c879a68af9adfd66fee980f91922a692'; 

        function setEnvironment(lat, lon) {
            fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}`)
                .then(r => r.json())
                .then(data => {
                    const weather = data.weather[0].main.toLowerCase();
                    const home = document.getElementById('home');
                    const text = document.getElementById('weather-statement');

                    if (weather.includes('clear')) {
                        home.style.backgroundColor = "#FFEB3B"; 
                        text.innerText = "Atmosphere: Clear";
                        text.style.color = "#111";
                    } else if (weather.includes('cloud') || weather.includes('rain')) {
                        home.style.backgroundColor = "#1E88E5"; 
                        text.innerText = "Atmosphere: Overcast";
                        text.style.color = "#fff";
                    } else {
                        home.style.backgroundColor = "#fff";
                        text.innerText = "Atmosphere: Neutral";
                    }
                })
                .catch(() => {
                    document.getElementById('weather-statement').innerText = "System Offline";
                });
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => setEnvironment(p.coords.latitude, p.coords.longitude));
        }
    </script>
</body>
</html>
