<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Academic Archive</title>
    <style>
        /* --- CORE SYSTEM --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
            color: #111;
            overflow: hidden; /* Prevents global scrolling */
        }

        .layout { display: flex; height: 100vh; width: 100vw; }

        /* --- SIDEBAR (McGillick Style: No Title) --- */
        nav.sidebar {
            width: 240px;
            height: 100%;
            border-right: 1px solid #eee;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            flex-shrink: 0;
        }

        nav.sidebar a {
            text-decoration: none;
            color: #999;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        nav.sidebar a.active { color: #111; font-weight: 600; }

        /* --- MAIN CONTENT AREA --- */
        main {
            flex-grow: 1;
            height: 100%;
            overflow-y: auto; /* Content scrolls, sidebar stays */
            position: relative;
        }

        section { display: none; min-height: 100%; }
        section.active { display: block; }

        /* --- HOME: THE SMART SCREEN (No Scrolling) --- */
        #home {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 2s ease;
            position: relative;
            overflow: hidden; /* Strictly no scrolling */
        }

        #weather-statement { font-size: 2.5rem; font-weight: 300; letter-spacing: -0.02em; }
        
        .algo-desc {
            position: absolute;
            bottom: 2rem;
            max-width: 400px;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(0,0,0,0.4);
            line-height: 1.5;
            padding: 0 20px;
        }

        /* --- POSTS & INTERACTIVE (Rickard Style) --- */
        .page-container { padding: 4rem 8%; max-width: 900px; }
        
        /* Sub-Nav for Categories */
        .sub-nav {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }

        .sub-nav span {
            font-size: 0.8rem;
            color: #999;
            cursor: pointer;
            text-transform: lowercase;
        }

        .sub-nav span:hover, .sub-nav span.active { color: #111; text-decoration: underline; }

        /* Archive Listing */
        .archive-item {
            display: flex;
            gap: 2rem;
            padding: 0.6rem 0;
            text-decoration: none;
            color: inherit;
            font-size: 0.95rem;
            border-bottom: 1px solid #fafafa;
        }

        .archive-item:hover .title { text-decoration: underline; }
        .date { color: #bbb; font-family: monospace; width: 80px; flex-shrink: 0; }
        .title { flex-grow: 1; }

    </style>
</head>
<body>

    <div class="layout">
        <nav class="sidebar">
            <a onclick="route('home')" id="nav-home">Home</a>
            <a onclick="route('posts')" id="nav-posts">Posts</a>
            <a onclick="route('interactive')" id="nav-interactive">Interactive</a>
        </nav>

        <main id="main-content">
            
            <section id="home" class="active">
                <h1 id="weather-statement">Analyzing environment...</h1>
                <div class="algo-desc">
                    This interface functions as a real-time environmental sensor. By translating regional meteorological data into a minimal color field, it bridges the gap between digital space and physical atmosphere.
                </div>
            </section>

            <section id="posts">
                <div class="page-container">
                    <div class="sub-nav">
                        <span class="active">all</span>
                        <span>most popular</span>
                        <span>society</span>
                        <span>cases</span>
                        <span>reviews</span>
                        <span>misc</span>
                    </div>
                    <div id="posts-list">
                        </div>
                </div>
            </section>

            <section id="interactive">
                <div class="page-container">
                    <div id="int-list">
                        </div>
                </div>
            </section>

        </main>
    </div>

    <script>
        // 1. NAVIGATION & ROUTING
        function route(id) {
            // Update Visibility
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            // Update Sidebar UI
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');

            // Reset Scroll position
            document.getElementById('main-content').scrollTop = 0;
        }

        // 2. DATA GENERATION (Placeholders)
        function loadContent() {
            const postsList = document.getElementById('posts-list');
            const intList = document.getElementById('int-list');

            // Generate 20 Posts (Format: 26-01-20)
            for(let i=1; i<=20; i++) {
                postsList.innerHTML += `
                <a href="your-post-link-here.html" class="archive-item">
                    <span class="date">26-04-${i < 10 ? '0'+i : i}</span>
                    <span class="title">Sample Academic Research Paper Title ${21-i}</span>
                </a>`;
            }

            // Generate 10 Interactive
            for(let i=1; i<=10; i++) {
                intList.innerHTML += `
                <a href="your-interactive-link.html" class="archive-item">
                    <span class="date">26-04-${i < 10 ? '0'+i : i}</span>
                    <span class="title">Interactive Data Visualization Experiment ${i}</span>
                </a>`;
            }
        }
        loadContent();

        // 3. WEATHER ALGORITHM
        // PASTE YOUR KEY HERE
        const apiKey = 'c879a68af9adfd66fee980f91922a692'; 

        function setEnvironment(lat, lon) {
            fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}`)
                .then(r => r.json())
                .then(data => {
                    const weather = data.weather[0].main.toLowerCase();
                    const home = document.getElementById('home');
                    const text = document.getElementById('weather-statement');

                    if (weather.includes('clear')) {
                        home.style.backgroundColor = "#FFF176"; // Direct Sunny Yellow
                        text.innerText = "It is sunny.";
                        text.style.color = "#111";
                    } else if (weather.includes('cloud') || weather.includes('rain') || weather.includes('drizzle')) {
                        home.style.backgroundColor = "#1E88E5"; // Direct Gloomy Blue
                        text.innerText = "It is gloomy.";
                        text.style.color = "#fff";
                    } else {
                        home.style.backgroundColor = "#f0f0f0";
                        text.innerText = "The air is neutral.";
                    }
                })
                .catch(() => {
                    document.getElementById('weather-statement').innerText = "Environment Offline.";
                });
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => setEnvironment(p.coords.latitude, p.coords.longitude));
        }
    </script>
</body>
</html>
