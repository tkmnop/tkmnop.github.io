<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Environmental Interface</title>
    <style>
        /* --- GLOBAL RESET & TYPOGRAPHY --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #111;
            overflow: hidden; /* We handle scrolling in the content area */
        }

        /* --- MAIN LAYOUT --- */
        .wrapper { display: flex; height: 100vh; width: 100vw; }

        /* --- SIDEBAR (McGillick Style) --- */
        nav {
            width: 280px;
            height: 100%;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            flex-shrink: 0;
            background: white;
        }

        .site-title { font-weight: 700; font-size: 1.2rem; margin-bottom: 3rem; text-transform: uppercase; letter-spacing: 0.1rem; }

        .nav-links { display: flex; flex-direction: column; gap: 1rem; }

        .nav-links a {
            text-decoration: none;
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active-link { color: #111; }

        /* --- CONTENT AREA (Rickard Style) --- */
        main {
            flex-grow: 1;
            height: 100%;
            overflow-y: auto;
            position: relative;
        }

        section { display: none; padding: 4rem 10%; min-height: 100%; }
        section.active { display: block; }

        /* --- HOME: THE SMART SCREEN --- */
        #home {
            padding: 0; /* Full bleed */
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f7f7f7; /* Default fallback */
            transition: background-color 2s ease-in-out;
        }

        .weather-message {
            max-width: 500px;
            text-align: center;
            padding: 2rem;
        }

        /* --- ARCHIVE LISTS (Rickard Style) --- */
        .archive-list { max-width: 800px; margin-top: 2rem; }
        .archive-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 1rem 0; 
            border-bottom: 1px solid #f0f0f0; 
            text-decoration: none; 
            color: inherit;
        }
        .archive-item:hover { background-color: #fafafa; }
        .archive-title { font-weight: 500; }
        .archive-date { color: #999; font-family: monospace; font-size: 0.85rem; }

        h2 { font-size: 0.8rem; text-transform: uppercase; color: #999; letter-spacing: 0.2rem; margin-bottom: 2rem; }

    </style>
</head>
<body>

    <div class="wrapper">
        <nav>
            <div class="site-title">Archive.01</div>
            <div class="nav-links">
                <a onclick="showPage('home')" id="link-home" class="active-link">Home</a>
                <a onclick="showPage('posts')" id="link-posts">Posts</a>
                <a onclick="showPage('interactive')" id="link-interactive">Interactive</a>
            </div>
        </nav>

        <main>
            <section id="home" class="active">
                <div class="weather-message">
                    <h1 id="weather-status" style="font-size: 3rem; font-weight: 300; line-height: 1.1;">Calibrating sensor...</h1>
                    <p id="location-name" style="margin-top: 1.5rem; font-family: monospace; opacity: 0.5;">REQUESTING COORDINATES</p>
                </div>
            </section>

            <section id="posts">
                <h2>Writing & Research</h2>
                <div id="post-list" class="archive-list">
                    </div>
            </section>

            <section id="interactive">
                <h2>Computational Experiments</h2>
                <div id="int-list" class="archive-list">
                    </div>
            </section>
        </main>
    </div>

    <script>
        // 1. NAVIGATION LOGIC (The Page Swapper)
        function showPage(id) {
            // Hide all sections
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            // Show selected section
            document.getElementById(id).classList.add('active');
            
            // Update nav link styling
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active-link'));
            document.getElementById('link-' + id).classList.add('active-link');
        }

        // 2. GENERATE ARCHIVE LISTS (Rickard Style)
        function generateArchives() {
            const postList = document.getElementById('post-list');
            const intList = document.getElementById('int-list');

            for (let i = 1; i <= 20; i++) {
                postList.innerHTML += `
                    <a href="#" class="archive-item">
                        <span class="archive-title">Research Log / Entry ${21-i}</span>
                        <span class="archive-date">APR ${i < 10 ? '0'+i : i} '26</span>
                    </a>`;
            }

            for (let i = 1; i <= 10; i++) {
                intList.innerHTML += `
                    <a href="#" class="archive-item">
                        <span class="archive-title">Protocol Beta-0${i}</span>
                        <span class="archive-date">RUNTIME_ERROR_0${i}</span>
                    </a>`;
            }
        }
        generateArchives();

        // 3. WEATHER LOGIC (The Smart Interface)
        // !IMPORTANT: PASTE YOUR KEY HERE
        const apiKey = 'c879a68af9adfd66fee980f91922a692'; 

        function updateWeather(lat, lon) {
            fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}`)
                .then(res => res.json())
                .then(data => {
                    const mainWeather = data.weather[0].main.toLowerCase();
                    const statusText = document.getElementById('weather-status');
                    const locationText = document.getElementById('location-name');
                    const homeSection = document.getElementById('home');

                    locationText.innerText = `LOC: ${data.name.toUpperCase()} / LAT: ${lat.toFixed(2)}`;

                    if (mainWeather.includes('clear')) {
                        homeSection.style.backgroundColor = "#FFEB3B"; // Sunny Yellow
                        statusText.innerText = "The sky is clear.";
                    } else if (mainWeather.includes('rain') || mainWeather.includes('cloud') || mainWeather.includes('drizzle')) {
                        homeSection.style.backgroundColor = "#2196F3"; // Gloomy Blue
                        statusText.innerText = "The atmosphere is heavy.";
                        statusText.style.color = "white"; // Better contrast for blue
                    } else {
                        homeSection.style.backgroundColor = "#eeeeee"; // Neutral gray
                        statusText.innerText = "The air is still.";
                    }
                })
                .catch(err => {
                    document.getElementById('weather-status').innerText = "Sensor Offline.";
                });
        }

        // Get User Location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                p => updateWeather(p.coords.latitude, p.coords.longitude),
                () => { document.getElementById('weather-status').innerText = "Location Denied."; }
            );
        }
    </script>
</body>
</html>
